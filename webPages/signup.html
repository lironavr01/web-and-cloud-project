<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה - RentFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="screen">

    <div class="header">הרשמה</div>

    <div class="content">
      <h2 class="subtitle">יצירת חשבון</h2>

      <form id="signupForm" novalidate>
        <div class="field">
          <label for="fullname">שם מלא</label>
          <input type="text" id="fullname" name="fullname" placeholder="מתן כהן">
          <span class="error-message" id="fullnameError"></span>
        </div>

        <div class="field">
          <label for="email">אימייל</label>
          <input type="email" id="email" name="email" placeholder="name@example.com">
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password">סיסמה</label>
          <input type="password" id="password" name="password" placeholder="בחר סיסמה חזקה">
          <span class="error-message" id="passwordError"></span>
        </div>

        <button type="submit" class="btn btn-primary">צור חשבון</button>
        <button type="button" class="btn btn-secondary">כבר יש משתמש? התחברות</button>

        <p class="success-message" id="successMessage"></p>
      </form>
    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
