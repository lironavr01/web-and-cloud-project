<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת תפקיד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="screen">
<div class="header">בחירת תפקיד</div>
<div class="content">
<h2 class="subtitle">בחר תפקיד</h2>

<div class="role-card selected" data-role="tenant">
<div class="badge">מומלץ</div>
<div class="role-title">שוכר</div>
<div class="role-desc">תשלומים, קבלות, פתיחת תקלות</div>
</div>

<div class="role-card" data-role="landlord">
<div class="role-title">משכיר</div>
<div class="role-desc">נכסים, חוזים, תחזוקה ותזכורות</div>
</div>

<button id="tenantBtn" class="btn-green">המשך כשוכר</button>
<button id="landlordBtn" class="btn-orange">המשך כמשכיר</button>
</div>
</div>
<script src="selection.js"></script>
</body>
</html>
